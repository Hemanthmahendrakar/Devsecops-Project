apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: digital-twin-hpa
  namespace: expense-system

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-twin

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50