<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — Digital Twin Avatar</title>

  <script>
    (function () {
      var saved = localStorage.getItem("dt-theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">

  <main class="login-wrap">
    <button class="theme-toggle login-theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light / dark theme" title="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>

    <section class="panel login-card">
      <p class="eyebrow">Digital Twin Avatar / Pod 2</p>
      <h1 class="login-title">Log in</h1>
      <p class="footnote login-subtitle">
        Use your existing Expense Tracker account.
      </p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form class="login-form" method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />

        <label class="login-label" for="username">Username</label>
        <input
          class="login-input"
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          value="{{ username or '' }}"
          required
          autofocus
        />

        <label class="login-label" for="password">Password</label>
        <input
          class="login-input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        />

        <button class="refresh-btn login-submit" type="submit">Log in</button>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var root = document.documentElement;
      var next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
      root.setAttribute("data-theme", next);
      localStorage.setItem("dt-theme", next);
    });
  </script>
</body>
</html>
